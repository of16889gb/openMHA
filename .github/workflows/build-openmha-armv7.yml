name: Build OpenMHA for ARMv7 (Ubuntu 20.04)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Docker Build Environment
        run: |
          # 创建编译脚本
          cat > build-openmha.sh << 'EOF'
          #!/bin/bash
          set -e
          
          # 更新包列表并安装依赖
          apt update
          apt install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            cmake \
            make \
            git \
            build-essential \
            libasound2-dev:armhf \
            libpulse-dev:armhf
          
          # 创建工作目录
          mkdir -p /opt/armv7_root
          mkdir -p /github/workspace/build
          
          # 交叉编译 liblsl
          echo "=== Building liblsl for ARMv7 ==="
          cd /tmp
          git clone https://github.com/sccn/liblsl.git
          mkdir liblsl_build && cd liblsl_build
          
          cmake ../liblsl \
            -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
            -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
            -DCMAKE_INSTALL_PREFIX=/opt/armv7_root \
            -DBUILD_SHARED_LIBS=ON \
            -DLSL_LIBRARY_TYPE=shared
          
          make -j$(nproc)
          make install
          
          # 验证 liblsl 安装结果
          echo "=== liblsl installed at: ==="
          ls -la /opt/armv7_root/lib/
          ls -la /opt/armv7_root/include/lsl/
          
          # 编译 OpenMHA
          echo "=== Building OpenMHA for ARMv7 ==="
          cd /github/workspace
          
          # 创建 CMake toolchain 文件
          cat > armv7-toolchain.cmake << 'TOOLCHAIN_EOF'
          SET(CMAKE_SYSTEM_NAME Linux)
          SET(CMAKE_SYSTEM_PROCESSOR armv7-a)
          
          SET(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          SET(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          SET(CMAKE_LINKER arm-linux-gnueabihf-ld)
          SET(CMAKE_AR arm-linux-gnueabihf-ar)
          
          # 查找路径设置
          SET(CMAKE_FIND_ROOT_PATH /opt/armv7_root /usr/arm-linux-gnueabihf)
          SET(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          SET(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          SET(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          SET(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          
          # 启用交叉编译标志
          SET(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -march=armv7-a -mfpu=neon -mfloat-abi=hard")
          SET(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -march=armv7-a -mfpu=neon -mfloat-abi=hard")
          TOOLCHAIN_EOF
          
          # 配置 OpenMHA
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=/github/workspace/armv7-toolchain.cmake \
            -DCMAKE_INSTALL_PREFIX=/github/workspace/install \
            -DLSL=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DLSL_LIBRARY=/opt/armv7_root/lib/liblsl.so \
            -DLSL_INCLUDE_DIR=/opt/armv7_root/include/lsl
          
          # 编译
          make -j$(nproc)
          make install
          
          # 检查生成的二进制文件
          echo "=== Built binaries ==="
          file /github/workspace/install/bin/* 2>/dev/null || file /github/workspace/build/bin/*
          
          # 显示依赖关系
          echo "=== Library dependencies ==="
          arm-linux-gnueabihf-readelf -d /github/workspace/install/bin/* 2>/dev/null | grep "NEEDED" || \
          arm-linux-gnueabihf-readelf -d /github/workspace/build/bin/* | grep "NEEDED"
          
          echo "=== Build completed successfully! ==="
          EOF
          
          chmod +x build-openmha.sh
      
      - name: Build in Ubuntu 20.04 Container
        uses: docker://ubuntu:20.04
        with:
          options: -v ${{ github.workspace }}:/github/workspace
          entrypoint: /bin/bash
          args: /github/workspace/build-openmha.sh
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmha-armv7-ubuntu20
          path: |
            install/
            build/bin/
          if-no-files-found: warn
      
      - name: Create release package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd install
          tar czf openmha-armv7-ubuntu20.tar.gz .
          cd ..
          mv install/openmha-armv7-ubuntu20.tar.gz .
          
          # 为发布创建校验和
          sha256sum openmha-armv7-ubuntu20.tar.gz > openmha-armv7-ubuntu20.tar.gz.sha256
      
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            openmha-armv7-ubuntu20.tar.gz
            openmha-armv7-ubuntu20.tar.gz.sha256
          prerelease: false
          generate_release_notes: true
